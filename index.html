<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; }
    li { margin: 6px 0; }
    .done { text-decoration: line-through; color: gray; }
  </style>
</head>
<body>
  <h2>Todo List</h2>
  <input id="input" type="text" placeholder="New todo..." />
  <button onclick="addTodo()">Add</button>
  <ul id="list"></ul>

  <script>
    const API = 'https://full-stack-app-make.onrender.com/todos';

    async function loadTodos() {
      const res = await fetch(API);
      const todos = await res.json();
      const list = document.getElementById('list');
      list.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');
        li.textContent = todo.text;
        if (todo.done) li.className = 'done';
        li.onclick = () => toggleTodo(todo.id);
        const del = document.createElement('button');
        del.textContent = 'x';
        del.onclick = (e) => { e.stopPropagation(); deleteTodo(todo.id); };
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    async function addTodo() {
      const input = document.getElementById('input');
      if (!input.value.trim()) return;
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input.value.trim() })
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id) {
      await fetch(`${API}/${id}/toggle`, { method: 'PATCH' });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
